{% extends "tasks/base.html" %}

{% block content %}

<form method="post">
    {% csrf_token %}

    <input
        type="text"
        name="title"
        value="{{ title|default:'' }}"
        placeholder="Title"
        required
    >

    <textarea name="description">{{ description|default:'' }}</textarea>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <button type="submit">Create Task</button>
</form>

{% endblock %}
